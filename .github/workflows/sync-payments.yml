name: Sync payments (Sheets to Supabase)

# Внешний планировщик вместо Vercel-крона: на тарифе Hobby Vercel кроны не исполняются,
# из-за чего синк доходов Sheets→Supabase замирал (см. инцидент v594). GitHub Actions
# ежечасно дёргает /api/cron-import-payments, который импортирует текущий+прошлый месяц
# для KZ и KG. Требует секрет репозитория CRON_SECRET (= env CRON_SECRET в Vercel).

on:
  schedule:
    # Каждый час в :07 (UTC). GitHub может задержать запуск на 5-20 мин под нагрузкой — это норма.
    - cron: '7 * * * *'
  workflow_dispatch: {}   # ручной запуск кнопкой во вкладке Actions

# Чтобы параллельные/просроченные запуски не накладывались
concurrency:
  group: sync-payments
  cancel-in-progress: false

jobs:
  sync:
    runs-on: ubuntu-latest
    timeout-minutes: 5
    steps:
      - name: Trigger import endpoint
        env:
          CRON_SECRET: ${{ secrets.CRON_SECRET }}
        run: |
          set -euo pipefail
          if [ -z "${CRON_SECRET:-}" ]; then
            echo "::error::Секрет CRON_SECRET не задан в репозитории (Settings -> Secrets and variables -> Actions)"
            exit 1
          fi
          resp=$(curl -sS -m 180 -w $'\n%{http_code}' \
            -H "Authorization: Bearer ${CRON_SECRET}" \
            https://salesdoc-app.vercel.app/api/cron-import-payments)
          code=$(printf '%s' "$resp" | tail -n1)
          body=$(printf '%s' "$resp" | sed '$d')
          echo "HTTP ${code}"
          echo "${body}"
          if [ "${code}" != "200" ]; then
            echo "::error::Импорт вернул HTTP ${code}"
            exit 1
          fi
