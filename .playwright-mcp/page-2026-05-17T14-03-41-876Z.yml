                - heading "Получение Access токен по коду авторизации, реализация на bash" [level=4] [ref=e315]
                - code [ref=e318]: "curl https://subdomain.amocrm.ru/oauth2/access_token -d \\ '{\"client_id\":\"xxx-xxx-xxx-xxx-xxx\",\"client_secret\":\"xxxxxx\",\"grant_type\":\"authorization_code\",\"code\":\"xxxxxxxx\",\"redirect_uri\":\"https://test.test/\"}' \\ -H 'Content-Type:application/json' \\ -X POST"
                - heading "Получение Access токен по коду авторизации, реализация на PHP" [level=4] [ref=e319]
                - code [ref=e322]:
                  - generic [ref=e323]: "<?php $subdomain = 'test'; //Поддомен нужного аккаунта $link = 'https://' . $subdomain . '.amocrm.ru/oauth2/access_token'; //Формируем URL для запроса /** Соберем данные для запроса */ $data = [ 'client_id' => 'xxxx', 'client_secret' => 'xxxx', 'grant_type' => 'authorization_code', 'code' => 'xxxxxx', 'redirect_uri' => 'https://test.ru/', ]; /** * Нам необходимо инициировать запрос к серверу. * Воспользуемся библиотекой cURL (поставляется в составе PHP). * Вы также можете использовать и кроссплатформенную программу cURL, если вы не программируете на PHP. */ $curl = curl_init(); //Сохраняем дескриптор сеанса cURL /** Устанавливаем необходимые опции для сеанса cURL */ curl_setopt($curl,CURLOPT_RETURNTRANSFER, true); curl_setopt($curl,CURLOPT_USERAGENT,'amoCRM-oAuth-client/1.0'); curl_setopt($curl,CURLOPT_URL, $link); curl_setopt($curl,CURLOPT_HTTPHEADER,['Content-Type:application/json']); curl_setopt($curl,CURLOPT_HEADER, false); curl_setopt($curl,CURLOPT_CUSTOMREQUEST, 'POST'); curl_setopt($curl,CURLOPT_POSTFIELDS, json_encode($data)); curl_setopt($curl,CURLOPT_SSL_VERIFYPEER, 1); curl_setopt($curl,CURLOPT_SSL_VERIFYHOST, 2); $out = curl_exec($curl); //Инициируем запрос к API и сохраняем ответ в переменную $code = curl_getinfo($curl, CURLINFO_HTTP_CODE); curl_close($curl); /** Теперь мы можем обработать ответ, полученный от сервера. Это пример. Вы можете обработать данные своим способом. */ $code = (int)$code; $errors = [ 400 => 'Bad request', 401 => 'Unauthorized', 403 => 'Forbidden', 404 => 'Not found', 500 => 'Internal server error', 502 => 'Bad gateway', 503 => 'Service unavailable', ]; try { /** Если код ответа не успешный - возвращаем сообщение об ошибке */ if ($code < 200 || $code > 204) { throw new Exception(isset($errors[$code]) ? $errors[$code] : 'Undefined error', $code); } } catch(\\Exception $e) { die('Ошибка: ' . $e->getMessage() . PHP_EOL . 'Код ошибки: ' . $e->getCode()); } /** * Данные получаем в формате JSON, поэтому, для получения читаемых данных, * нам придётся перевести ответ в формат, понятный PHP */ $response = json_decode($out, true); $access_token = $response['access_token']; //Access токен $refresh_token = $response['refresh_token']; //Refresh токен $token_type = $response['token_type']; //Тип токена $expires_in = $response['expires_in']; //Через сколько действие токена истекает"
                - heading "Получение нового access token по его истечении" [level=3] [ref=e324]
                - paragraph [ref=e325]:
                  - text: Из предыдущего пункта вы заметили, что вместе с Access token был также возвращен Refresh token.
                  - text: Он необходим для продолжения работы с API, по истечении срока действия Access токена, т.е. это довольно частая операция.
                - paragraph [ref=e326]: "Refresh token имеет два существенных ограничения его жизни:"
                - list [ref=e327]:
                  - listitem [ref=e328]:
                    - text: Refresh токен действует всего 3 месяца. Если интеграция не используется в течение 3 месяцев,
                    - text: не было ни одного запроса на актуализацию ключа, то интеграция потеряет доступ к данным и будем необходимо повторно
                    - text: запрашивать разрешение у пользователя на доступ к его аккаунту
                  - listitem [ref=e329]:
                    - text: Refresh token можно обменять только один раз.
                    - text: После отправки его в метод и получения новой пары access token/refresh token старый refresh token становится не актуальным.
                    - text: И после получения нового refresh token его необходимо обязательно сохранить, иначе придется вновь перезапрашивать доступ у пользователя.
                - paragraph [ref=e330]:
                  - text: По истечении срока действия возможность получения Access токена по нему становится невозможной.
                  - text: Для обмена необходимо сделать запрос на специальный метод с действительным Refresh токеном.
                  - text: В ответ вы получите новый Access и Refresh токены.
