                - heading "Получение Access токен по коду авторизации, реализация на PHP" [level=4] [ref=e426]
                - code [ref=e429]:
                  - generic [ref=e430]: "<?php $subdomain = 'test'; //Поддомен нужного аккаунта $link = 'https://' . $subdomain . '.amocrm.ru/oauth2/access_token'; //Формируем URL для запроса /** Соберем данные для запроса */ $data = [ 'client_id' => 'xxxx', 'client_secret' => 'xxxx', 'grant_type' => 'refresh_token', 'refresh_token' => 'xxxxxx', 'redirect_uri' => 'https://test.ru/', ]; /** * Нам необходимо инициировать запрос к серверу. * Воспользуемся библиотекой cURL (поставляется в составе PHP). * Вы также можете использовать и кроссплатформенную программу cURL, если вы не программируете на PHP. */ $curl = curl_init(); //Сохраняем дескриптор сеанса cURL /** Устанавливаем необходимые опции для сеанса cURL */ curl_setopt($curl,CURLOPT_RETURNTRANSFER, true); curl_setopt($curl,CURLOPT_USERAGENT,'amoCRM-oAuth-client/1.0'); curl_setopt($curl,CURLOPT_URL, $link); curl_setopt($curl,CURLOPT_HTTPHEADER,['Content-Type:application/json']); curl_setopt($curl,CURLOPT_HEADER, false); curl_setopt($curl,CURLOPT_CUSTOMREQUEST, 'POST'); curl_setopt($curl,CURLOPT_POSTFIELDS, json_encode($data)); curl_setopt($curl,CURLOPT_SSL_VERIFYPEER, 1); curl_setopt($curl,CURLOPT_SSL_VERIFYHOST, 2); $out = curl_exec($curl); //Инициируем запрос к API и сохраняем ответ в переменную $code = curl_getinfo($curl, CURLINFO_HTTP_CODE); curl_close($curl); /** Теперь мы можем обработать ответ, полученный от сервера. Это пример. Вы можете обработать данные своим способом. */ $code = (int)$code; $errors = [ 400 => 'Bad request', 401 => 'Unauthorized', 403 => 'Forbidden', 404 => 'Not found', 500 => 'Internal server error', 502 => 'Bad gateway', 503 => 'Service unavailable', ]; try { /** Если код ответа не успешный - возвращаем сообщение об ошибке */ if ($code < 200 || $code > 204) { throw new Exception(isset($errors[$code]) ? $errors[$code] : 'Undefined error', $code); } } catch(\\Exception $e) { die('Ошибка: ' . $e->getMessage() . PHP_EOL . 'Код ошибки: ' . $e->getCode()); } /** * Данные получаем в формате JSON, поэтому, для получения читаемых данных, * нам придётся перевести ответ в формат, понятный PHP */ $response = json_decode($out, true); $access_token = $response['access_token']; //Access токен $refresh_token = $response['refresh_token']; //Refresh токен $token_type = $response['token_type']; //Тип токена $expires_in = $response['expires_in']; //Через сколько действие токена истекает"
                - heading "Долгосрочные токены" [level=3] [ref=e431]
                - paragraph [ref=e432]: В феврале 2024 мы добавили возможность создавать долгосрочные токены для внешних и приватных интеграций.
                - paragraph [ref=e433]:
                  - text: Для создания необходимо перейти на вкладку "Ключи", нажать кнопку "Сгенерировать токен", выбрать дату окончания действия токена и скопировать токен.
                  - strong [ref=e434]: После того, как токен создан, вы увидете его только один раз, поэтому его необходимо скопировать.
                - paragraph [ref=e435]:
                  - img [ref=e436]
                  - img [ref=e437]
                - paragraph [ref=e438]:
                  - text: Важно отметить, что подобные токены подойдут для небольших интеграций, которые разрабатываются под конкретный аккаунт.
                  - text: Срок действия токена пользователь выбирает сам и он действует от 1 дня до 5 лет. Кроме этого, во вкладке "Выданные доступы" долгосрочные токены имеют не только дату выдачи, но и дату окончания действия, но вы всегда можете отозвать сами нажав на кнопку "Отозвать доступ".
                - paragraph [ref=e439]: Долгосрочные токены не имеют refresh_token и поэтому не требуют обмена и не требуют написания логики, которая будет следить за актуальностью токенов.
                - heading "Запросы к API с передачей access token" [level=3] [ref=e440]
                - paragraph [ref=e441]: C помощью полученного Access токена вы можете легко делать запросы к API приложения.
                - paragraph [ref=e442]: "Вам не нужно отправлять куки-файлы с каждым запросом, также вам нужно добавить заголовок Authorization: Bearer {access токен} во все ваши запросы к API amoCRM."
                - heading "Пример запроса к методу account" [level=4] [ref=e443]
                - code [ref=e446]:
                  - generic [ref=e447]: "<?php $subdomain = 'test'; //Поддомен нужного аккаунта $link = 'https://' . $subdomain . '.amocrm.ru/api/v4/account'; //Формируем URL для запроса /** Получаем access_token из вашего хранилища */ $access_token = 'xxxx'; /** Формируем заголовки */ $headers = [ 'Authorization: Bearer ' . $access_token ]; /** * Нам необходимо инициировать запрос к серверу. * Воспользуемся библиотекой cURL (поставляется в составе PHP). * Вы также можете использовать и кроссплатформенную программу cURL, если вы не программируете на PHP. */ $curl = curl_init(); //Сохраняем дескриптор сеанса cURL /** Устанавливаем необходимые опции для сеанса cURL */ curl_setopt($curl,CURLOPT_RETURNTRANSFER, true); curl_setopt($curl,CURLOPT_USERAGENT,'amoCRM-oAuth-client/1.0'); curl_setopt($curl,CURLOPT_URL, $link); curl_setopt($curl,CURLOPT_HTTPHEADER, $headers); curl_setopt($curl,CURLOPT_HEADER, false); curl_setopt($curl,CURLOPT_SSL_VERIFYPEER, 1); curl_setopt($curl,CURLOPT_SSL_VERIFYHOST, 2); $out = curl_exec($curl); //Инициируем запрос к API и сохраняем ответ в переменную $code = curl_getinfo($curl, CURLINFO_HTTP_CODE); curl_close($curl); /** Теперь мы можем обработать ответ, полученный от сервера. Это пример. Вы можете обработать данные своим способом. */ $code = (int)$code; $errors = [ 400 => 'Bad request', 401 => 'Unauthorized', 403 => 'Forbidden', 404 => 'Not found', 500 => 'Internal server error', 502 => 'Bad gateway', 503 => 'Service unavailable', ]; try { /** Если код ответа не успешный - возвращаем сообщение об ошибке */ if ($code < 200 || $code > 204) { throw new Exception(isset($errors[$code]) ? $errors[$code] : 'Undefined error', $code); } } catch(\\Exception $e) { die('Ошибка: ' . $e->getMessage() . PHP_EOL . 'Код ошибки: ' . $e->getCode()); }"
                - paragraph [ref=e448]:
                  - text: Подобным образом можно делать запросы ко всем методам API, на которые у токена хватает прав.
                  - text: Токен имеет права пользователя, который предоставил доступ.
                - heading "Хук об отключении интеграции" [level=3] [ref=e449]
                - paragraph [ref=e450]:
                  - text: Начиная с ноября 2021 года, вы можете указать адрес, на который будет отправлен запрос, когда интеграция будет отключена.
                  - text: После получения хука вы сможете остановить интеграцию, ограничить запросы к аккаунту, в котором произошло отключение.
                - paragraph [ref=e451]:
                  - text: Мы рекомендуем указывать данную ссылку, так как это поможет вам не делать лишних запросов к API,
                  - text: отслеживать когда интеграция была отключена.
                - heading "Проверка подлинности хука" [level=4] [ref=e452]
                - paragraph [ref=e453]:
                  - text: Что бы удостоверится, что хук действительно пришел от amoCRM, а не от злоумышлеников,
                  - text: рекомендуется проверять подпись хука, передаваемую в GET-параметре signature,
                  - text: а так же id oauth-клиента интеграции, передаваемый в GET-параметре client_uuid.
                  - text: В качестве подписи хука передается
                  - link "HMAC" [ref=e454] [cursor=pointer]:
                    - /url: https://ru.wikipedia.org/wiki/HMAC
                  - text: ", сообщением является конкатенация id oauth-клиента интеграции"
                  - text: с id аккаунта, для которого отзывается токен, ключем – секретный ключ oauth-клиента интеграции, алгоритм шифровния – sha256.
                - heading "Пример кода для проверки подлинности" [level=5] [ref=e455]
                - code [ref=e458]:
                  - generic [ref=e459]:
                    - text: "<?php // id oauth-клиента интеграции $clientId = 'xxx'; // секретный ключ oauth-клиента интеграции $clientSecret = 'xxx'; if (empty($_GET['client_uuid']) || empty($_GET['signature']) || empty($_GET['account_id'])) { throw new"
                    - generic [ref=e460]: \HttpInvalidParamException
                    - text: "('Wrong hook format'); } $hookClientId = $_GET['client_uuid']; $hookSignature = $_GET['signature']; $hookAccountId = (int) $_GET['account_id']; if ($clientId !== $hookClientId) { throw new"
                    - generic [ref=e461]: \Exception
                    - text: "('Invalid hook signature'); } if (!hash_equals( hash_hmac('sha256', sprintf('%s|%s', $clientId, $hookAccountId), $clientSecret), $hookSignature )) { throw new"
                    - generic [ref=e462]: \Exception
                    - text: "('Invalid hook signature'); } // проверка подлинности пройденна, можно вызывать вашу логику обработки хука"
                - heading "Обработка ошибок" [level=3] [ref=e463]
                - paragraph [ref=e464]: "В ходе отработки всей вышеуказанной логики может возникать ряд исключений, которые необходимо обрабатывать, рассмотрим каждое из них:"
                - list [ref=e465]:
                  - listitem [ref=e466]:
                    - text: Если пользователь не дал разрешение на доступ к аккаунту, в случае использования кнопки amoCRM, будет вызвана функция,
                    - text: которая передана в одном из параметров. Подробней можно прочесть в разделе
                    - link "Кнопка amoCRM" [ref=e467] [cursor=pointer]:
                      - /url: https://www.amocrm.ru/developers/content/oauth/button
                    - text: .
                    - text: Если же страница была открыта не кнопкой, то в случае отказа будет произведен редирект на Redirect URI c GET-параметром error=access_denied.
                  - listitem [ref=e468]:
                    - text: Если администратор аккаунта деактивировал установку интеграции, то выданные ей access_token будут отозваны.
                    - text: При обращении к API вы получите HTTP код 401.
                    - text: Для продолжения работы интеграции интегратору необходимо снова получить авторизацию для его интеграции у пользователя.
                  - listitem [ref=e469]:
                    - text: Если вы не записали актуальный refresh token, он был утерян, либо прошло более 3 месяцев,
                    - text: то для возобновления работы интеграции вам опять необходимо пройти процесс авторизации приложения.
                  - listitem [ref=e470]:
                    - text: Если вами были утеряны основные ключи интеграции или вы случайно их опубликовали,
                    - text: то вы можете обновить секретный ключ в модальном окне интеграции в аккаунте, где она была создана.
                    - text: После обновления Secret Key интеграции вам необходимо обновить секретный ключ в конфигурациях ваших интеграциях.
                - separator [ref=e471]
                - heading "Смотрите также" [level=4] [ref=e472]
