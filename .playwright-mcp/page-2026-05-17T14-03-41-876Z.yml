                - heading "Обмен кода авторизации на access token и refresh token" [level=3] [ref=e221]
                - paragraph [ref=e222]:
                  - text: Получив Authorization code, вам необходимо сделать запрос на специальный метод /oauth2/access_token, описанный ниже.
                  - text: В ответ вы получите пару Access и Refresh token, а также время в секундах, через которое токен истекает.
                - paragraph [ref=e223]:
                  - text: Access токен аналогичен ключу сессии. Его можно сохранить в приложении и использовать для запросов к API до истечения времени его жизни.
                  - text: Токен должен быть доступен только вашему приложению, поэтому не рекомендуется сохранять его в cookies браузера,
                  - text: открытых конфигурационных файлах и т. п.
