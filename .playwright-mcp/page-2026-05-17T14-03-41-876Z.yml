              - generic [ref=e114]: Пример по шагам
              - generic [ref=e115]:
                - paragraph [ref=e116]:
                  - text: Для примера рассмотрим полный цикл получения доступа к данным, начиная от регистрации новой интеграции.
                  - text: При этом мы будем рассматривать прямую работу с API авторизации, но вы можете либо воспользоваться нашей готовой
                  - link "библиотекой на PHP" [ref=e117] [cursor=pointer]:
                    - /url: https://www.amocrm.ru/developers/content/oauth/lib
                  - text: для упрощения разработки, либо готовыми библиотеками сторонних вендоров, которые можно найти по
                  - link "ссылке" [ref=e118] [cursor=pointer]:
                    - /url: https://oauth.net/code/
                  - text: .
                - paragraph [ref=e119]: Мы разрабатывали авторизацию, основываясь на протоколе oAuth 2.0, поэтому вы можете найти в открытых источниках много примеров и документацию, описывающих взаимодействие и логику выполнения запросов.
                - heading "Оглавление" [level=3] [ref=e120]
                - list [ref=e121]:
                  - listitem [ref=e122]:
                    - link "Регистрация приложения" [ref=e123] [cursor=pointer]:
                      - /url: "#Регистрация-приложения"
                  - listitem [ref=e124]:
                    - link "Получение Authorization code" [ref=e125] [cursor=pointer]:
                      - /url: "#Получение-Authorization-code"
                  - listitem [ref=e126]:
                    - link "Обмен кода авторизации на access token и refresh token" [ref=e127] [cursor=pointer]:
                      - /url: "#Обмен-кода-авторизации-на-access-token-и-refresh-token"
                  - listitem [ref=e128]:
                    - link "Получение нового access token по его истечении" [ref=e129] [cursor=pointer]:
                      - /url: "#Получение-нового-access-token-по-его-истечении"
                  - listitem [ref=e130]:
                    - link "Долгосрочные токены" [ref=e131] [cursor=pointer]:
                      - /url: "#Долгосрочные-токены"
                  - listitem [ref=e132]:
                    - link "Запросы к API с передачей access token" [ref=e133] [cursor=pointer]:
                      - /url: "#Запросы-к-API-с-передачей-access-token"
                  - listitem [ref=e134]:
                    - link "Хук об отключении интеграции" [ref=e135] [cursor=pointer]:
                      - /url: "#Хук-об-отключении-интеграции"
                  - listitem [ref=e136]:
                    - link "Обработка ошибок" [ref=e137] [cursor=pointer]:
                      - /url: "#Обработка-ошибок"
                - heading "Регистрация приложения" [level=3] [ref=e138]
                - paragraph [ref=e139]: "Все начинается с того, что вам необходимо зайти в раздел \"амоМаркет\" того аккаунта, в котором вы будете осуществлять поддержку интеграции в будущем. Обратите внимание:"
                - list [ref=e140]:
                  - listitem [ref=e141]:
                    - text: Именно за этим аккаунтом будет закреплена Интеграция.
                    - text: Это означает, что любой из администраторов этого аккаунта сможет управлять интеграцией и получит доступ к общим ключам приложения.
                    - text: Подробнее о терминах можно прочесть
                    - link "здесь" [ref=e142] [cursor=pointer]:
                      - /url: https://www.amocrm.ru/developers/content/oauth/oauth
                    - text: .
                    - text: По сути этот аккаунт мы будем считать аккаунтом разработчика.
                    - text: Если вы разрабатываете публичную интеграции, необходимо ознакомиться с
                    - link "требованиями" [ref=e143] [cursor=pointer]:
                      - /url: https://www.amocrm.ru/developers/content/integrations/requirements
                    - text: .
                  - listitem [ref=e144]: Для создания интеграции вам необходимо обладать правами администратора аккаунта
                  - listitem [ref=e145]: При подключении приватной интеграции на аккаунте который не является техническим, клиенту необходимо заполнить заявление на отказ от технической поддержки amoCRM. Техническая поддержка не сможет принять обращения по ошибкам системы для фиксации и исправлений на аккаунте где было подписано заявление. Данное ограничение не касается консультаций и вопросов по оплате. Приняв единожды данное соглашение, оно фиксируется в аккаунте amoCRM навсегда. Отозвать соглашение и вернуть аккаунт к прежнему состоянию возможности уже не будет.
                - paragraph [ref=e146]:
                  - img "Приватная интеграция" [ref=e147]
                - paragraph [ref=e148]:
                  - text: После нажатия на кнопку
                  - strong [ref=e149]: Создать Интеграцию
                  - text: ", в появившейся форме, вам необходимо указать Название интеграции, выбрать требуемые доступы и указать описание."
                  - text: Также необходимо указать Redirect URI – url страницы получения токенов и загрузить логотип интеграции.
                  - text: Кроме того, есть возможность указать url для хука об отключении интеграции – на него придет хук, когда интеграция будет отключена пользователем. Поле для хука об отключении является необязательным.
                - paragraph [ref=e150]: "Свойства интеграции:"
                - list [ref=e151]:
                  - listitem [ref=e152]: Название интеграции (не более 255 символов) – отображается на странице интеграций, модальном окне для предоставления доступов, а также участвует в поиске по странице интеграций.
                  - listitem [ref=e153]: Описание интеграции (не более 65000 символов) – отображается в модальном окне интеграции в аккаунте пользователя. Допускается использование html верстки.
                  - listitem [ref=e154]: Ссылка для перенаправления – ссылка на ваш сайт, который будет обрабатывать работу с ключами. Важно, что домен должен быть защищен SSL сертификатом, если вы планируете использовать интеграцию более, чем в одном аккаунте.Просим обратить внимание на то, что мы не поддерживаем кириллические домены и кирилические домены, преобразованные с помощью паникода. Также мы периодически проверяем доступность домена, как обязательное условие для работы интеграции.
                  - listitem [ref=e155]: Ссылка для хука об отключении интеграции – на этот адрес будет отправлен GET-запрос при отключении интеграции пользователем. В запросе будет содержаться 2 параметра account_id и client_id.
                  - listitem [ref=e156]:
                    - text: Предоставить доступ – минимальный набор необходимых разрешений для работы интеграции. Подробнее про разрешения можно прочитать в
                    - link "статье" [ref=e157] [cursor=pointer]:
                      - /url: https://www.amocrm.ru/developers/content/oauth/scopes
                    - text: .
                  - listitem [ref=e158]: Иконка интеграции (400х272 jpeg/jpg/png/gif) – отображается в списке интеграций, а также в окне запроса доступа у пользователя
                  - listitem [ref=e159]:
                    - text: Контроль дублей – галку необходимо ставить, если ваша интеграция поддерживает
                    - link "Контроль дублей" [ref=e160] [cursor=pointer]:
                      - /url: https://www.amocrm.ru/developers/content/crm_platform/duplication-control
                    - text: . После установки галки, интеграция будет доступна в настройках контроля дублей.
                  - listitem [ref=e161]:
                    - text: Множественные источники – галку необходимо ставить, если ваша интеграция сама управляет источниками через
                    - link "API" [ref=e162] [cursor=pointer]:
                      - /url: https://www.amocrm.ru/developers/content/crm_platform/sources-api
                    - text: . Если галка установлена, amoCRM не будет создавать источники по-умолчанию, интеграция сама должна будет создать все необходимые ей источники.
                - paragraph [ref=e163]: "Кроме этих пунктов, администраторам аккаунта, в котором создана интеграция, будут доступны: ID интеграции, секретный ключ интеграции, код авторизации (после включения интеграции)."
                - paragraph [ref=e164]:
                  - text: После заполнения полей вам необходимо сохранить интеграцию.
                  - text: После этого новая интеграция будет создана и открыто модальное окно созданной интеграции. В открывшемся модальном окне, на вкладке
                  - strong [ref=e165]: ключи
                  - text: будут отображены необходимые ключи.
                - paragraph [ref=e166]: Обратите внимание, что Secret key и Integration ID привязаны к интеграции и будут показаны только в вашем аккаунте разработчика.
                - heading "Получение Authorization code" [level=3] [ref=e167]
                - paragraph [ref=e168]:
                  - text: Напомним, что код авторизации является временным ключом, который действует только 20 минут.
                  - text: C его помощью вам необходимо в течении этого времени получить refresh token и access токен.
                  - text: Он является временным, т.к. может быть перехвачен, но в случае перехвата злоумышленник не сможет с ним ничего сделать, если вы не сообщите ему ключи приложения, известные только администраторам аккаунта, в котором создана интеграция.
                - paragraph [ref=e169]: "Получить Authorization code можно тремя способами:"
                - list [ref=e170]:
                  - listitem [ref=e171]:
                    - text: Скопировать из модального окна установленной интеграции. Этот случай подойдет, если вам необходимо проинтегрировать только один аккаунт amoCRM. Подробнее можно прочитать в разделе
                    - link "Упрощенная авторизация" [ref=e172] [cursor=pointer]:
                      - /url: https://www.amocrm.ru/developers/content/oauth/easy-auth
                    - text: .
                  - listitem [ref=e173]: Если в вашей интеграции есть загруженный архив с виджетом, то при его установке вы получите Webhook на указанный в настройках интеграции Redirect URI.
                  - listitem [ref=e174]: Получить код через адрес предоставления доступа интеграции. После предоставления доступа, пользовать будет перенаправлен на указанный Redirect URI.
                - paragraph [ref=e175]:
                  - text: Вы можете упростить разработку при использовании способа получения ключа через GET-параметры, используя готовую
                  - link "Кнопку amoCRM" [ref=e176] [cursor=pointer]:
                    - /url: https://www.amocrm.ru/developers/content/oauth/button
                  - text: .
                - paragraph [ref=e177]: "Полная логика способа получения ключа через GET-параметры заключается в следующем:"
                - list [ref=e178]:
                  - listitem [ref=e179]:
                    - text: Пользователь, у которого вы хотите запросить доступ, находится у вас на сайте и может открыть предложенную вами ссылку.
                    - text: "*Внимание: Очень важно, чтобы для пользователя весь процесс был максимально прозрачен и понятен. При клике на ссылку пользователь должен однозначно понимать следующее: произойдет запрос его доступов в его аккаунте amoCRM, какую интеграцию он включает."
                    - text: Именно поэтому мы предлагаем использовать нашу брендированную кнопку, описание которой вы можете найти на странице
                    - link "Кнопка amoCRM" [ref=e180] [cursor=pointer]:
                      - /url: https://www.amocrm.ru/developers/content/oauth/button
                  - listitem [ref=e181]:
                    - text: Генерация ссылки, по которой должен перейти пользователь. Вам необходимо отправить пользователя на URL
                    - 'link "https://www.amocrm.ru/oauth?client_id={Integration" [ref=e182] [cursor=pointer]':
                      - /url: "https://www.amocrm.ru/oauth?client_id={Integration"
                    - text: "ID}&state={параметр состояния, который будет возвращен вам на Redirect URI}&mode={popup или post_message}."
                    - text: Integration ID вам уже известен.
                    - text: state – это сгенерированный вами строковый параметр, возможно хеш.
                    - text: State нужен для того, чтобы при получении ответа от amoCRM, вы могли проверить его достоверность,
                    - text: сравнив отправленный ключ и полученный в результате, чтобы удостовериться в отсутствии подмены CSRF.
                    - text: Параметр mode отвечает за обработку запроса на Redirect URI. В случае popup – окно авторизации будет закрыто,
                    - text: а переход на Redirect URI будет выполнен в основном окне. В случае передачи значения post_message –
                    - text: перенаправление произойдет в окне, которое было открыто, после обработки кода авторизации вам нужно закрыть окно.
                    - text: Также можно сообщить информацию об успешности действия в основное окно с использованием функции
                    - link "postMessage" [ref=e183] [cursor=pointer]:
                      - /url: https://developer.mozilla.org/ru/docs/Web/API/Window/postMessage
                    - text: .
                  - listitem [ref=e184]:
                    - text: Перейдя по ссылке, пользователь увидит логотип вашей интеграции, который вы загружали при ее создании, название, а также перечень доступов, которые запрашивает приложение.
                    - text: Открывать данную страницу мы советуем как модальное окно – в popup. Это позволит пользователю не терять контекста страницы, которая открыла popup.
                    - img "Окно предоставления доступов" [ref=e185]
                  - listitem [ref=e186]: В случае, если пользователь не авторизован – ему будет предложено авторизоваться в amoCRM, иначе пользователю будет дан выбор из аккаунтов, где он является администратором. Для приватных интеграций, список будет ограничен 1 аккаунтом.
                  - listitem [ref=e187]:
                    - text: После выбора аккаунта и нажатия кнопки Разрешить, интеграция будет установлена в выбранный аккаунт,
                    - text: а пользователь перенаправлен в модальном или основном окне, в зависимости от параметра mode,
                    - text: на указанный в настройках интеграции Redirect URI c GET-параметрами code, referer, state, from_widget, platform.
                    - text: Параметр code содержит Authorization code, параметр referer – адрес аккаунта пользователя, параметр state – строку,
                    - text: которую вы передавали при открытии окна, если строка не была передана, данный параметр возвращен не будет.
                    - text: Параметр platform показывает, на какой платформе был установлен виджет, российской или глобальной. При установке из аккаунта на
                    - text: amocrm.ru приходит значение 1, при установке из аккаунта на amocrm.com/kommo.com – значение 2.
                    - text: Если мы отправляем Webhook после установки виджета, то вам дополнительно придет GET-параметр from_widget
                  - listitem [ref=e188]: В случае, если пользователь нажмет кнопку Отказать приложению в доступе, он будет перенаправлен на Redirect URI с GET-параметром error=access_denied, а также GET-параметром state, если он был передан.
